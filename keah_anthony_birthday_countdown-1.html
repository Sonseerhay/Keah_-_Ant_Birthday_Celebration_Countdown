<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keah & Anthony's Birthday Countdown</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,300&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #D4AF37;
      --gold-light: #F5D769;
      --black: #0A0A0A;
      --cream: #F9F3E3;
    }
    body {
      background: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', Georgia, sans-serif;
      overflow: hidden;
      position: relative;
    }
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 800px; height: 800px;
      background: radial-gradient(ellipse at center, rgba(212,175,55,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }
    .deco-line {
      width: 100%; max-width: 700px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 16px auto; opacity: 0.8;
    }
    .wrapper {
      position: relative; z-index: 2;
      text-align: center; padding: 20px;
      animation: fadeIn 1.4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .eyebrow {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic; color: var(--gold);
      font-size: clamp(14px, 3vw, 20px);
      letter-spacing: 0.25em; text-transform: lowercase;
    }
    .names {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: clamp(42px, 11vw, 110px);
      color: var(--cream); line-height: 0.9;
      text-shadow: 0 0 60px rgba(212,175,55,0.25);
      margin: 8px 0;
    }
    .names span { color: var(--gold); font-style: italic; }
    .subtitle {
      font-size: clamp(12px, 2.5vw, 16px);
      letter-spacing: 0.5em; color: rgba(212,175,55,0.6);
    }
    .countdown {
      display: flex; gap: clamp(8px, 2.5vw, 28px);
      justify-content: center; align-items: flex-end;
      margin: 24px 0 10px;
    }
    .unit { display: flex; flex-direction: column; align-items: center; }
    .unit-num {
      font-family: 'Bebas Neue', Georgia, sans-serif;
      font-size: clamp(56px, 14vw, 130px);
      color: var(--cream); line-height: 1;
      min-width: clamp(70px, 16vw, 160px);
      text-align: center;
      transition: color 0.2s;
    }
    .unit-num.tick { animation: tickAnim 0.3s ease; }
    @keyframes tickAnim {
      0% { transform: scale(1.08); color: var(--gold); }
      100% { transform: scale(1); color: var(--cream); }
    }
    .unit-label {
      font-size: clamp(10px, 2vw, 13px);
      letter-spacing: 0.35em; color: rgba(212,175,55,0.55);
      margin-top: 4px;
    }
    .separator {
      font-size: clamp(36px, 9vw, 90px);
      color: rgba(212,175,55,0.3); line-height: 1;
      margin-bottom: 22px;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.3; } 50% { opacity: 0; }
    }
    .date-line {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic; color: rgba(249,243,227,0.45);
      font-size: clamp(13px, 2.5vw, 17px);
      letter-spacing: 0.2em; margin-top: 6px;
    }
    .done-msg {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: clamp(36px, 8vw, 80px);
      color: var(--gold);
      text-shadow: 0 0 80px rgba(212,175,55,0.8);
      display: none;
    }
    .spark {
      position: fixed; width: 4px; height: 4px;
      border-radius: 50%; background: var(--gold);
      pointer-events: none; z-index: 5;
      animation: float linear forwards;
    }
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="deco-line"></div>
    <h1 class="names">Keah <span>&amp;</span> Anthony's</h1>
    <p class="subtitle">Birthday</p>
    <div class="deco-line"></div>
    <div class="countdown" id="countdown">
      <div class="unit">
        <div class="unit-num" id="days">00</div>
        <div class="unit-label">Days</div>
      </div>
      <div class="separator">:</div>
      <div class="unit">
        <div class="unit-num" id="hours">00</div>
        <div class="unit-label">Hours</div>
      </div>
      <div class="separator">:</div>
      <div class="unit">
        <div class="unit-num" id="minutes">00</div>
        <div class="unit-label">Minutes</div>
      </div>
      <div class="separator">:</div>
      <div class="unit">
        <div class="unit-num" id="seconds">00</div>
        <div class="unit-label">Seconds</div>
      </div>
    </div>
    <div class="done-msg" id="done">🎉 Happy Birthday Keah & Anthony! 🎉</div>
    <div class="deco-line"></div>
    <p class="date-line">April 18, 2026</p>
  </div>
  <script>
    const target = new Date('April 18, 2026 00:00:00').getTime();
    const pad = n => String(n).padStart(2, '0');
    const els = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
    };
    let prevSec = null;
    function spawnSpark() {
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.bottom = '-10px';
      s.style.background = Math.random() > 0.5 ? '#D4AF37' : '#F5D769';
      s.style.animationDuration = (3 + Math.random() * 4) + 's';
      s.style.width = s.style.height = (2 + Math.random() * 4) + 'px';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 7000);
    }
    setInterval(spawnSpark, 600);
    function update() {
      const diff = target - Date.now();
      if (diff <= 0) {
        document.getElementById('countdown').style.display = 'none';
        document.getElementById('done').style.display = 'block';
        return;
      }
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);
      els.days.textContent = pad(days);
      els.hours.textContent = pad(hours);
      els.minutes.textContent = pad(minutes);
      els.seconds.textContent = pad(seconds);
      if (prevSec !== seconds) {
        els.seconds.classList.remove('tick');
        void els.seconds.offsetWidth;
        els.seconds.classList.add('tick');
        prevSec = seconds;
      }
    }
    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
